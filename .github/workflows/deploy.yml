name: Deploy SIASATA ke VPS

on:
  push:
    branches:
      - main # Script ini akan jalan otomatis setiap ada push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Eksekusi Script Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 1610
          script: |
            cd /home/siasata.rplxsata.com/backend
            bash deploy.sh